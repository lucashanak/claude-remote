name: Build Desktop App

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Download xterm.js assets
        run: |
          chmod +x setup-assets.sh
          ./setup-assets.sh

      - name: Determine version
        id: version
        run: |
          LATEST=$(git describe --tags --abbrev=0 2>/dev/null || echo "v1.0.0")
          LATEST="${LATEST#v}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$LATEST"
          PATCH=$((PATCH + 1))
          VER="${MAJOR}.${MINOR}.${PATCH}"
          echo "version=$VER" >> "$GITHUB_OUTPUT"

      - name: Update version
        run: |
          VER="${{ steps.version.outputs.version }}"
          sed -i '' "s/packageVersion = .*/packageVersion = \"$VER\"/" desktopApp/build.gradle.kts

      - name: Build DMG
        run: ./gradlew :desktopApp:packageDmg

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: ClaudeRemote-macOS
          path: desktopApp/build/compose/binaries/main/dmg/*.dmg

  build-linux:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Download xterm.js assets
        run: |
          chmod +x setup-assets.sh
          ./setup-assets.sh

      - name: Build DEB
        run: ./gradlew :desktopApp:packageDeb

      - name: Upload DEB
        uses: actions/upload-artifact@v4
        with:
          name: ClaudeRemote-Linux
          path: desktopApp/build/compose/binaries/main/deb/*.deb
