name: Build Desktop App

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Generate Gradle wrapper
        run: gradle wrapper --gradle-version=8.11.1

      - name: Download xterm.js assets
        run: |
          chmod +x setup-assets.sh
          ./setup-assets.sh

      - name: Determine version
        id: version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          LATEST=$(gh release list --limit 1 --json tagName -q '.[0].tagName' 2>/dev/null || echo "v1.0.0")
          LATEST="${LATEST#v}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$LATEST"
          PATCH=$((PATCH + 1))
          VER="${MAJOR}.${MINOR}.${PATCH}"
          echo "version=$VER" >> "$GITHUB_OUTPUT"

      - name: Update version
        run: |
          VER="${{ steps.version.outputs.version }}"
          sed -i '' "s/packageVersion = .*/packageVersion = \"$VER\"/" desktopApp/build.gradle.kts

      - name: Build DMG
        run: ./gradlew :desktopApp:packageDmg -Dorg.gradle.jvmargs="-Xmx4g"

      - name: Rename DMG
        run: |
          DMG=$(find desktopApp/build/compose/binaries/main/dmg -name "*.dmg" | head -1)
          cp "$DMG" ClaudeRemote-macOS.dmg

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: ClaudeRemote-macOS
          path: ClaudeRemote-macOS.dmg

  build-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Generate Gradle wrapper
        run: gradle wrapper --gradle-version=8.11.1

      - name: Download xterm.js assets
        shell: bash
        run: |
          chmod +x setup-assets.sh
          ./setup-assets.sh

      - name: Determine version
        id: version
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          LATEST=$(gh release list --limit 1 --json tagName -q '.[0].tagName' 2>/dev/null || echo "v1.0.0")
          LATEST="${LATEST#v}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$LATEST"
          PATCH=$((PATCH + 1))
          VER="${MAJOR}.${MINOR}.${PATCH}"
          echo "version=$VER" >> "$GITHUB_OUTPUT"

      - name: Update version
        shell: bash
        run: |
          VER="${{ steps.version.outputs.version }}"
          sed -i "s/packageVersion = .*/packageVersion = \"$VER\"/" desktopApp/build.gradle.kts

      - name: Build MSI
        run: ./gradlew :desktopApp:packageMsi

      - name: Rename MSI
        shell: bash
        run: |
          MSI=$(find desktopApp/build/compose/binaries/main/msi -name "*.msi" | head -1)
          cp "$MSI" ClaudeRemote-windows.msi

      - name: Upload MSI
        uses: actions/upload-artifact@v4
        with:
          name: ClaudeRemote-Windows
          path: ClaudeRemote-windows.msi

  build-linux:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Generate Gradle wrapper
        run: gradle wrapper --gradle-version=8.11.1

      - name: Download xterm.js assets
        run: |
          chmod +x setup-assets.sh
          ./setup-assets.sh

      - name: Determine version
        id: version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          LATEST=$(gh release list --limit 1 --json tagName -q '.[0].tagName' 2>/dev/null || echo "v1.0.0")
          LATEST="${LATEST#v}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$LATEST"
          PATCH=$((PATCH + 1))
          VER="${MAJOR}.${MINOR}.${PATCH}"
          echo "version=$VER" >> "$GITHUB_OUTPUT"

      - name: Update version
        run: |
          VER="${{ steps.version.outputs.version }}"
          sed -i "s/packageVersion = .*/packageVersion = \"$VER\"/" desktopApp/build.gradle.kts

      - name: Build DEB
        run: ./gradlew :desktopApp:packageDeb

      - name: Rename DEB
        run: |
          DEB=$(find desktopApp/build/compose/binaries/main/deb -name "*.deb" | head -1)
          cp "$DEB" ClaudeRemote-linux.deb

      - name: Upload DEB
        uses: actions/upload-artifact@v4
        with:
          name: ClaudeRemote-Linux
          path: ClaudeRemote-linux.deb

  release:
    needs: [build-macos, build-windows, build-linux]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Find target release
        id: version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Wait briefly for Android workflow to create the release
          sleep 30

          # Find latest release tag (created by Android or earlier desktop run)
          TAG=$(gh release list --limit 1 --json tagName -q '.[0].tagName' 2>/dev/null || echo "")

          if [ -z "$TAG" ]; then
            # Fallback: compute version from git tags
            LATEST=$(gh release list --limit 1 --json tagName -q '.[0].tagName' 2>/dev/null || echo "v1.0.0")
            LATEST="${LATEST#v}"
            IFS='.' read -r MAJOR MINOR PATCH <<< "$LATEST"
            PATCH=$((PATCH + 1))
            TAG="v${MAJOR}.${MINOR}.${PATCH}"
          fi

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Target release: $TAG"

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: ClaudeRemote-macOS

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: ClaudeRemote-Windows

      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: ClaudeRemote-Linux

      - name: Upload desktop artifacts to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          ASSETS="ClaudeRemote-macOS.dmg ClaudeRemote-windows.msi ClaudeRemote-linux.deb"

          if gh release view "$TAG" &>/dev/null; then
            echo "Uploading to existing release $TAG..."
            gh release upload "$TAG" $ASSETS --clobber
          else
            echo "Creating release $TAG..."
            gh release create "$TAG" $ASSETS \
              --target "${{ github.sha }}" \
              --title "$TAG" \
              --notes "Desktop release: macOS DMG + Windows MSI + Linux DEB"
          fi
