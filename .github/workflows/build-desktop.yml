name: Build Desktop App

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Generate Gradle wrapper
        run: gradle wrapper --gradle-version=8.11.1

      - name: Download xterm.js assets
        run: |
          chmod +x setup-assets.sh
          ./setup-assets.sh

      - name: Determine version
        id: version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          LATEST=$(gh release list --limit 1 --json tagName -q '.[0].tagName' 2>/dev/null || echo "v1.0.0")
          LATEST="${LATEST#v}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$LATEST"
          PATCH=$((PATCH + 1))
          VER="${MAJOR}.${MINOR}.${PATCH}"
          echo "version=$VER" >> "$GITHUB_OUTPUT"

      - name: Update version
        run: |
          VER="${{ steps.version.outputs.version }}"
          sed -i '' "s/packageVersion = .*/packageVersion = \"$VER\"/" desktopApp/build.gradle.kts

      - name: Generate macOS icon
        run: |
          SRC=desktopApp/src/main/resources/icon.png
          ICONSET=AppIcon.iconset
          mkdir -p "$ICONSET"
          sips -z 16 16 "$SRC" --out "$ICONSET/icon_16x16.png"
          sips -z 32 32 "$SRC" --out "$ICONSET/icon_16x16@2x.png"
          sips -z 32 32 "$SRC" --out "$ICONSET/icon_32x32.png"
          sips -z 64 64 "$SRC" --out "$ICONSET/icon_32x32@2x.png"
          sips -z 128 128 "$SRC" --out "$ICONSET/icon_128x128.png"
          sips -z 256 256 "$SRC" --out "$ICONSET/icon_128x128@2x.png"
          sips -z 256 256 "$SRC" --out "$ICONSET/icon_256x256.png"
          sips -z 512 512 "$SRC" --out "$ICONSET/icon_256x256@2x.png"
          sips -z 512 512 "$SRC" --out "$ICONSET/icon_512x512.png"
          cp "$SRC" "$ICONSET/icon_512x512@2x.png"
          iconutil -c icns "$ICONSET" -o desktopApp/src/main/resources/icon.icns
          rm -rf "$ICONSET"

      - name: Build DMG
        run: ./gradlew :desktopApp:packageDmg -Dorg.gradle.jvmargs="-Xmx4g"

      - name: Rename DMG
        run: |
          DMG=$(find desktopApp/build/compose/binaries/main/dmg -name "*.dmg" | head -1)
          cp "$DMG" ClaudeRemote-macOS.dmg

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: ClaudeRemote-macOS
          path: ClaudeRemote-macOS.dmg

  # Windows and Linux builds disabled for now
  # build-windows:
  # build-linux:

  release:
    needs: [build-macos]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Find target release
        id: version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Wait for Android to finish and create/update release
          sleep 120
          TAG=$(gh release list --limit 1 --json tagName -q '.[0].tagName' 2>/dev/null || echo "")
          if [ -z "$TAG" ]; then
            LATEST=$(gh release list --limit 1 --json tagName -q '.[0].tagName' 2>/dev/null || echo "v1.0.0")
            LATEST="${LATEST#v}"
            IFS='.' read -r MAJOR MINOR PATCH <<< "$LATEST"
            PATCH=$((PATCH + 1))
            TAG="v${MAJOR}.${MINOR}.${PATCH}"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Target release: $TAG"

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: ClaudeRemote-macOS

      - name: Upload desktop artifacts to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          ASSETS="ClaudeRemote-macOS.dmg"

          if gh release view "$TAG" &>/dev/null; then
            echo "Uploading to existing release $TAG..."
            gh release upload "$TAG" $ASSETS --clobber
          else
            echo "Creating release $TAG..."
            gh release create "$TAG" $ASSETS \
              --target "${{ github.sha }}" \
              --title "$TAG" \
              --notes "Desktop release: macOS DMG + Windows MSI + Linux DEB"
          fi
