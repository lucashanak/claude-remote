name: Build and Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.v.outputs.version }}
      tag: ${{ steps.v.outputs.tag }}
      code: ${{ steps.v.outputs.code }}
    steps:
      - name: Compute next version
        id: v
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          LATEST=$(gh release list --limit 1 --json tagName -q '.[0].tagName' --repo "${{ github.repository }}" 2>/dev/null || echo "v1.0.0")
          LATEST="${LATEST#v}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$LATEST"
          PATCH=$((PATCH + 1))
          VER="${MAJOR}.${MINOR}.${PATCH}"
          TAG="v${VER}"
          CODE=$((MAJOR * 10000 + MINOR * 100 + PATCH))
          echo "version=$VER" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "code=$CODE" >> "$GITHUB_OUTPUT"
          echo "Version: $VER (code: $CODE, tag: $TAG)"

  build-mosh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache mosh binary
        id: mosh-cache
        uses: actions/cache@v4
        with:
          path: androidApp/src/main/jniLibs/arm64-v8a/libmosh.so
          key: mosh-client-arm64-v1

      - name: Install build dependencies
        if: steps.mosh-cache.outputs.cache-hit != 'true'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq autoconf automake libtool pkg-config protobuf-compiler

      - name: Setup Android NDK
        if: steps.mosh-cache.outputs.cache-hit != 'true'
        uses: android-actions/setup-android@v3

      - name: Install NDK
        if: steps.mosh-cache.outputs.cache-hit != 'true'
        run: sdkmanager "ndk;27.2.12479018"

      - name: Build mosh-client for arm64
        if: steps.mosh-cache.outputs.cache-hit != 'true'
        run: |
          export ANDROID_NDK_HOME="$ANDROID_HOME/ndk/27.2.12479018"
          bash build-mosh.sh "$ANDROID_NDK_HOME"
          ls -la androidApp/src/main/jniLibs/arm64-v8a/libmosh.so
          file androidApp/src/main/jniLibs/arm64-v8a/libmosh.so

      - name: Upload mosh binary
        uses: actions/upload-artifact@v4
        with:
          name: mosh-client-arm64
          path: androidApp/src/main/jniLibs/arm64-v8a/libmosh.so

  build-android:
    runs-on: ubuntu-latest
    needs: [version, build-mosh]
    outputs:
      sha256: ${{ steps.hash.outputs.sha256 }}
      patch_file: ${{ steps.patch.outputs.patch_file }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download mosh binary
        uses: actions/download-artifact@v4
        with:
          name: mosh-client-arm64
          path: androidApp/src/main/jniLibs/arm64-v8a/

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Generate Gradle wrapper
        run: gradle wrapper --gradle-version=8.11.1

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Download xterm.js assets
        run: |
          chmod +x setup-assets.sh
          ./setup-assets.sh

      - name: Update version in build.gradle.kts
        run: |
          VER="${{ needs.version.outputs.version }}"
          CODE="${{ needs.version.outputs.code }}"
          sed -i "s/versionCode = .*/versionCode = $CODE/" androidApp/build.gradle.kts
          sed -i "s/versionName = .*/versionName = \"$VER\"/" androidApp/build.gradle.kts

      - name: Build release APK
        run: ./gradlew :androidApp:assembleRelease

      - name: Sign APK
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE }}" | base64 -d > /tmp/release.keystore
          APK=$(find androidApp/build -name "*.apk" -path "*/release/*" | head -1)
          BT="${ANDROID_HOME}/build-tools/$(ls ${ANDROID_HOME}/build-tools/ | sort -V | tail -1)"

          ${BT}/zipalign -v 4 "$APK" /tmp/aligned.apk
          ${BT}/apksigner sign \
            --ks /tmp/release.keystore \
            --ks-key-alias clauderemote \
            --ks-pass "pass:${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" \
            --key-pass "pass:${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" \
            --out ClaudeRemote.apk /tmp/aligned.apk
          ${BT}/apksigner verify ClaudeRemote.apk

          rm /tmp/release.keystore

      - name: Compute SHA-256
        id: hash
        run: |
          SHA=$(sha256sum ClaudeRemote.apk | cut -d' ' -f1)
          echo "sha256=$SHA" >> "$GITHUB_OUTPUT"
          echo "SHA-256: $SHA"

      - name: Generate delta patch
        id: patch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          sudo apt-get install -y -qq bsdiff

          NEW_VER="${{ needs.version.outputs.version }}"
          APK_SIZE=$(stat -c%s "ClaudeRemote.apk")

          PREV_TAG=$(gh release list --limit 1 --json tagName -q '.[0].tagName' --repo "${{ github.repository }}" 2>/dev/null || echo "")

          if [ -n "$PREV_TAG" ]; then
            PREV_VER="${PREV_TAG#v}"
            mkdir -p /tmp/prev
            gh release download "$PREV_TAG" --pattern "ClaudeRemote.apk" --dir /tmp/prev/ --repo "${{ github.repository }}" 2>/dev/null || true

            if [ -f /tmp/prev/ClaudeRemote.apk ]; then
              PATCH_NAME="patch-${PREV_VER}-to-${NEW_VER}.bspatch"
              bsdiff /tmp/prev/ClaudeRemote.apk ClaudeRemote.apk "$PATCH_NAME"

              PATCH_SIZE=$(stat -c%s "$PATCH_NAME")
              PCT=$(( PATCH_SIZE * 100 / APK_SIZE ))
              echo "Patch size: $PATCH_SIZE bytes ($PCT% of APK)"

              if [ "$PATCH_SIZE" -lt "$((APK_SIZE * 80 / 100))" ]; then
                echo "patch_file=$PATCH_NAME" >> "$GITHUB_OUTPUT"
              else
                echo "Patch too large ($PCT%), skipping"
                rm "$PATCH_NAME"
              fi
            fi
          fi

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: ClaudeRemote.apk

      - name: Upload patch artifact
        if: steps.patch.outputs.patch_file != ''
        uses: actions/upload-artifact@v4
        with:
          name: android-patch
          path: ${{ steps.patch.outputs.patch_file }}

  build-macos:
    runs-on: macos-latest
    needs: [version]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Generate Gradle wrapper
        run: gradle wrapper --gradle-version=8.11.1

      - name: Download xterm.js assets
        run: |
          chmod +x setup-assets.sh
          ./setup-assets.sh

      - name: Update version
        run: |
          VER="${{ needs.version.outputs.version }}"
          sed -i '' "s/packageVersion = .*/packageVersion = \"$VER\"/" desktopApp/build.gradle.kts

      - name: Generate macOS icon
        run: |
          SRC=desktopApp/src/main/resources/icon.png
          ICONSET=AppIcon.iconset
          mkdir -p "$ICONSET"
          sips -z 16 16 "$SRC" --out "$ICONSET/icon_16x16.png"
          sips -z 32 32 "$SRC" --out "$ICONSET/icon_16x16@2x.png"
          sips -z 32 32 "$SRC" --out "$ICONSET/icon_32x32.png"
          sips -z 64 64 "$SRC" --out "$ICONSET/icon_32x32@2x.png"
          sips -z 128 128 "$SRC" --out "$ICONSET/icon_128x128.png"
          sips -z 256 256 "$SRC" --out "$ICONSET/icon_128x128@2x.png"
          sips -z 256 256 "$SRC" --out "$ICONSET/icon_256x256.png"
          sips -z 512 512 "$SRC" --out "$ICONSET/icon_256x256@2x.png"
          sips -z 512 512 "$SRC" --out "$ICONSET/icon_512x512.png"
          cp "$SRC" "$ICONSET/icon_512x512@2x.png"
          iconutil -c icns "$ICONSET" -o desktopApp/src/main/resources/icon.icns
          rm -rf "$ICONSET"

      - name: Build DMG
        run: ./gradlew :desktopApp:packageDmg -Dorg.gradle.jvmargs="-Xmx4g"

      - name: Rename DMG
        run: |
          DMG=$(find desktopApp/build/compose/binaries/main/dmg -name "*.dmg" | head -1)
          cp "$DMG" ClaudeRemote-macOS.dmg

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: ClaudeRemote-macOS.dmg

  release:
    runs-on: ubuntu-latest
    needs: [version, build-android, build-macos]
    steps:
      - name: Download APK
        uses: actions/download-artifact@v4
        with:
          name: android-apk

      - name: Download patch
        if: needs.build-android.outputs.patch_file != ''
        uses: actions/download-artifact@v4
        with:
          name: android-patch

      - name: Download DMG
        uses: actions/download-artifact@v4
        with:
          name: macos-dmg

      - name: Create release with all artifacts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ needs.version.outputs.tag }}"
          SHA="${{ needs.build-android.outputs.sha256 }}"
          PATCH="${{ needs.build-android.outputs.patch_file }}"

          ASSETS="ClaudeRemote.apk ClaudeRemote-macOS.dmg"
          if [ -n "$PATCH" ] && [ -f "$PATCH" ]; then
            ASSETS="$ASSETS $PATCH"
          fi

          if gh release view "$TAG" --repo "${{ github.repository }}" &>/dev/null; then
            echo "Release $TAG exists, uploading assets..."
            gh release upload "$TAG" $ASSETS --clobber --repo "${{ github.repository }}"
            gh release edit "$TAG" --notes "sha256:$SHA" --repo "${{ github.repository }}"
          else
            echo "Creating release $TAG..."
            gh release create "$TAG" $ASSETS \
              --target "${{ github.sha }}" \
              --title "$TAG" \
              --notes "sha256:$SHA" \
              --repo "${{ github.repository }}"
          fi
