<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        background: #2D2D2D;
        color: #E1E1E1;
        padding: 6px;
    }
    .bar {
        display: flex;
        gap: 4px;
        flex-wrap: wrap;
        align-items: center;
    }
    button {
        background: #444;
        color: #E1E1E1;
        border: none;
        border-radius: 4px;
        padding: 4px 10px;
        font-size: 12px;
        cursor: pointer;
        white-space: nowrap;
    }
    button:hover { background: #555; }
    button:active { background: #666; }
    button.active { background: #6200EE; color: white; }
    button.danger { background: #B00020; }
    .spacer { flex: 1; }
    select {
        background: #444;
        color: #E1E1E1;
        border: 1px solid #555;
        border-radius: 4px;
        padding: 4px 6px;
        font-size: 12px;
    }
</style>
</head>
<body>
<div class="bar">
    <button onclick="sendCmd('/plan\n')">Plan</button>
    <button onclick="sendCmd('/auto-accept\n')">Auto</button>
    <button class="danger" onclick="sendCmd('yolo')">YOLO</button>
    <select id="model" onchange="switchModel(this.value)">
        <option value="opus">Opus</option>
        <option value="sonnet" selected>Sonnet</option>
        <option value="haiku">Haiku</option>
    </select>
    <span class="spacer"></span>
    <button onclick="sendEscape()">Esc</button>
    <button onclick="sendCmd('/clear\n')">/clear</button>
    <button onclick="sendCmd('/help\n')">/help</button>
</div>
<script>
function sendCmd(cmd) {
    if (window.ControlBridge) {
        window.ControlBridge.onCommand(cmd);
    }
}
function switchModel(model) {
    if (window.ControlBridge) {
        window.ControlBridge.onSwitchModel(model);
    }
}
function sendEscape() {
    if (window.ControlBridge) {
        window.ControlBridge.onEscape();
    }
}
</script>
</body>
</html>
