<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body { background:#1b1b1b; overflow:hidden; touch-action:none; user-select:none; -webkit-user-select:none; }

/* Toolbar */
.toolbar { display:flex; align-items:center; gap:6px; padding:6px 10px; background:#1b1b1b; border-bottom:1px solid #333; }
.tool-btn { padding:8px 14px; font-size:13px; font-weight:500; font-family:sans-serif; background:#333; color:#ccc; border:none; border-bottom:1px solid #404040; border-radius:5px; cursor:pointer; touch-action:manipulation; }
.tool-btn.active { background:#1b1b1b; color:#3399ff; }
.spacer { flex:1; }

/* Panels */
.panels { display:block; }
.panel { display:none; }
.panel.active { display:block; }

/* ============ COMPACT KEYBOARD (UK Dark theme) ============ */
.kb-panel { padding:4px 3px 6px 3px; }
.row { display:flex; gap:4px; padding:2px 3px; flex-wrap:nowrap; justify-content:center; }
.row-home { padding-left:5%; padding-right:5%; }
.row-shift { padding-left:2px; padding-right:2px; }

.key {
    flex:1 1 0; min-width:0; height:69px; padding:0 2px;
    font-size:20px; font-weight:400;
    font-family:sans-serif;
    background:#333; color:#fff;
    border:none; border-bottom:1px solid #404040; border-radius:5px;
    cursor:pointer; display:flex; align-items:center; justify-content:center;
    touch-action:manipulation; transition:background 0.08s;
    white-space:nowrap;
}
.key:active, .key.pressed { background:#1b1b1b; }
.key.mod-active { background:#1b1b1b; color:#3399ff; }
.space-key { flex:5 1 0; font-size:14px; color:#ccc; }
.wide-key { flex:1.5 1 0; font-size:16px; }
.xwide-key { flex:1.8 1 0; font-size:16px; }
.shifted .char-key { text-transform:uppercase; }

/* Modifier keys */
.key-mod { background:#333; font-size:14px; color:#ccc; }
.key-mod.mod-active { background:#1b1b1b; color:#3399ff; }

/* Number row: shorter */
.row-num .key { height:52px; font-size:18px; }

/* Bottom row */
.row-bottom { gap:4px; padding:2px 3px; }
.row-bottom .key { height:66px; }

/* F-key row styling (wide layout) */
.fn-row { gap:1px; padding:1px 2px; }
.fn-row .key { height:34px; font-size:11px; background:rgba(255,255,255,0.05); }
.fn-sep { width:8px; flex:0 0 8px; }

/* Scrollable rows (symbols) */
.row-scroll { justify-content:flex-start; overflow-x:auto; scrollbar-width:none; }
.row-scroll::-webkit-scrollbar { display:none; }
.row-scroll .key { flex:0 0 auto; min-width:42px; height:52px; padding:0 8px; font-size:18px; }

/* Nav cluster for wide layout */
.nav-sep { width:6px; flex:0 0 6px; }
.nav-key { flex:0 0 auto; width:48px; font-size:11px; }

/* ============ SWIPE KEYS (Unexpected Keyboard style) ============ */
.swipe-key {
    position:relative; flex:1 1 0; height:69px; padding:0;
    display:grid;
    grid-template-areas: "nw ne" "c c" "sw se";
    grid-template-rows: 16px 1fr 16px;
    grid-template-columns: 1fr 1fr;
    align-items:center; justify-items:center;
    background:#333; color:#fff;
    border:none; border-bottom:1px solid #404040; border-radius:5px; cursor:pointer;
    touch-action:manipulation; transition:background 0.08s;
    font-family:sans-serif;
}
.swipe-key:active, .swipe-key.pressed { background:#1b1b1b; }
.sw-c { grid-area:c; font-size:20px; font-weight:400; pointer-events:none; }
.sw-nw,.sw-ne,.sw-sw,.sw-se { font-size:13px; color:#ccc; pointer-events:none; line-height:1; }
.sw-nw { grid-area:nw; justify-self:start; padding-left:4px; }
.sw-ne { grid-area:ne; justify-self:end; padding-right:4px; }
.sw-sw { grid-area:sw; justify-self:start; padding-left:4px; }
.sw-se { grid-area:se; justify-self:end; padding-right:4px; }
.shifted .swipe-key .sw-c { text-transform:uppercase; }

/* Swipe-enabled special keys (Shift, Backspace) — UK style */
.swipe-special {
    position:relative; height:69px; padding:0;
    display:grid;
    grid-template-areas: "nw ne" "c c" "sw se";
    grid-template-rows: 16px 1fr 16px;
    grid-template-columns: 1fr 1fr;
    align-items:center; justify-items:center;
    background:#333; color:#ccc;
    border:none; border-bottom:1px solid #404040; border-radius:5px; cursor:pointer;
    touch-action:manipulation; transition:background 0.08s;
    font-family:sans-serif; font-size:16px;
}
.swipe-special:active, .swipe-special.pressed { background:#1b1b1b; }
.swipe-special.mod-active { background:#1b1b1b; color:#3399ff; }
.swipe-special .sw-c { grid-area:c; font-size:16px; font-weight:400; pointer-events:none; }
.swipe-special .sw-ne { font-size:11px; color:#888; pointer-events:none; line-height:1; grid-area:ne; justify-self:end; padding-right:4px; }
.uk-shift { flex:1.5 1 0; }
.uk-bksp { flex:1.5 1 0; }

/* Unexpected Keyboard style bottom row */
.row-uk { gap:4px; padding:2px 3px; }
.row-uk .key { height:66px; font-size:14px; }
.row-uk .uk-ctrl { flex:1.7 1 0; }
.row-uk .uk-fn { flex:1.1 1 0; font-size:14px; background:#333; color:#ccc; border:none; border-bottom:1px solid #404040; border-radius:5px; cursor:pointer; touch-action:manipulation; }
.row-uk .uk-fn.mod-active { background:#1b1b1b; color:#3399ff; }
.row-uk .uk-nav {
    flex:1.1 1 0; padding:0;
    display:grid;
    grid-template-areas: "nw n ne" "w c e" "sw s se";
    grid-template-rows: 1fr 1fr 1fr;
    grid-template-columns: 1fr 1fr 1fr;
    align-items:center; justify-items:center;
    background:#333; color:#ccc;
    border:none; border-bottom:1px solid #404040; border-radius:5px; cursor:pointer;
    touch-action:manipulation; font-family:sans-serif;
}
.row-uk .uk-nav.pressed { background:#1b1b1b; }
.nav-n { grid-area:n; font-size:12px; pointer-events:none; }
.nav-s { grid-area:s; font-size:12px; pointer-events:none; }
.nav-w { grid-area:w; font-size:12px; pointer-events:none; }
.nav-e { grid-area:e; font-size:12px; pointer-events:none; }
.nav-nw { grid-area:nw; font-size:8px; color:#888; pointer-events:none; }
.nav-ne { grid-area:ne; font-size:8px; color:#888; pointer-events:none; }
.nav-sw { grid-area:sw; font-size:8px; color:#888; pointer-events:none; }
.nav-se { grid-area:se; font-size:8px; color:#888; pointer-events:none; }
.row-uk .uk-enter { flex:1.7 1 0; }
.row-uk .space-key {
    flex:4.4 1 0; position:relative;
}
.row-uk .space-key .sp-hint-l,
.row-uk .space-key .sp-hint-r {
    position:absolute; top:50%; transform:translateY(-50%);
    font-size:11px; color:#555; pointer-events:none;
}
.row-uk .space-key .sp-hint-l { left:10px; }
.row-uk .space-key .sp-hint-r { right:10px; }

/* ============ TOUCHPAD ============ */
.tp-panel.active { display:flex; flex-direction:column; }
.tp-area { flex:1; margin:6px; background:rgba(255,255,255,0.03); border:1px solid #333; border-radius:5px; display:flex; align-items:center; justify-content:center; touch-action:none; }
.tp-hint { color:rgba(255,255,255,0.15); font-size:14px; pointer-events:none; font-family:sans-serif; }
.tp-buttons { display:flex; gap:5px; padding:6px; }
.tp-btn { flex:1; height:48px; font-size:14px; font-weight:400; font-family:sans-serif; background:#333; color:#ccc; border:none; border-bottom:1px solid #404040; border-radius:5px; cursor:pointer; touch-action:manipulation; }
.tp-btn:active { background:#1b1b1b; }

/* Quick action bar above keyboard */
.action-bar { display:flex; gap:4px; padding:3px 3px; overflow-x:auto; scrollbar-width:none; }
.action-bar::-webkit-scrollbar { display:none; }
.action-btn { flex:0 0 auto; padding:6px 12px; font-size:12px; font-weight:500; font-family:sans-serif; background:rgba(51,153,255,0.15); color:#3399ff; border:none; border-radius:4px; cursor:pointer; white-space:nowrap; touch-action:manipulation; }
.action-btn:active { background:rgba(51,153,255,0.35); }

/* Diacritics popup */
#diacPopup { position:fixed; display:none; background:#333; border:1px solid #404040; border-radius:5px; padding:4px; z-index:300; box-shadow:0 4px 16px rgba(0,0,0,0.6); }
#diacPopup .diac-row { display:flex; gap:3px; }
.diac-key { min-width:44px; padding:0 5px; height:48px; font-size:20px; font-family:sans-serif; background:#1b1b1b; color:#fff; border:none; border-radius:5px; cursor:pointer; display:flex; align-items:center; justify-content:center; touch-action:manipulation; }
.diac-key:active { background:#3399ff; }

/* Clipboard history popup */
#clipPopup { position:fixed; display:none; background:#1b1b1b; border:1px solid #404040; border-radius:5px; padding:4px 0; z-index:300; box-shadow:0 4px 16px rgba(0,0,0,0.5); max-width:280px; max-height:300px; overflow-y:auto; }
.clip-item { display:block; width:100%; padding:8px 12px; font-size:12px; font-family:monospace; color:#ccc; background:none; border:none; border-bottom:1px solid #333; text-align:left; cursor:pointer; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.clip-item:active { background:rgba(51,153,255,0.3); }

/* ============ WIDE: side-by-side KB + TP ============ */
@media (min-width:901px) {
    .toolbar .tab-btn { display:none; }
    .panels { display:flex; flex-direction:row; align-items:stretch; }
    .panel { display:block; }
    .kb-panel { flex:4; min-width:0; padding:4px 2px 6px 2px; }
    .tp-panel { display:flex; flex-direction:column; flex:1; min-width:0; border-left:1px solid #333; }
    .tp-area { min-height:0; }
    .key { height:46px; font-size:16px; }
    .fn-row .key { height:32px; font-size:11px; }
    .row-scroll .key { height:38px; font-size:13px; }
    .nav-key { width:44px; height:46px; font-size:11px; }
    .row { gap:3px; padding:2px 2px; }
    .row-home { padding-left:3%; padding-right:3%; }
    .tp-btn.mid { flex:0.5; }
}

/* Landscape narrow */
@media (orientation:landscape) and (max-width:900px) {
    .key { height:50px; font-size:20px; }
    .swipe-key { height:50px; }
    .swipe-special { height:50px; }
    .sw-c { font-size:18px; }
    .swipe-special .sw-c { font-size:14px; }
    .swipe-special .sw-ne { font-size:9px; }
    .sw-nw,.sw-ne,.sw-sw,.sw-se { font-size:10px; }
    .swipe-key { grid-template-rows: 12px 1fr 12px; }
    .swipe-special { grid-template-rows: 12px 1fr 12px; }
    .row { gap:3px; padding:2px 2px; }
    .row-scroll .key { height:38px; font-size:14px; }
    .tp-btn { height:32px; font-size:12px; }
    .toolbar { padding:4px 6px; }
    .tool-btn { padding:6px 12px; font-size:13px; }
    .tp-area { min-height:120px; }
    .kb-panel { padding:4px 2px 6px 2px; }
    .row-uk .key { height:46px; }
    .row-uk .uk-nav { height:46px; }
}
</style>
</head>
<body>

<div class="toolbar">
    <button class="tool-btn" id="menuBtn">Menu</button>
    <button class="tool-btn" id="clipBtn" style="font-size:12px">Clip</button>
    <div class="spacer"></div>
    <button class="tool-btn tab-btn" id="tpToggle">TP</button>
    <button class="tool-btn" id="hideBtn">Hide</button>
</div>

<div class="panels">
    <div class="panel kb-panel active" id="kbPanel"></div>
    <div class="panel tp-panel" id="tpPanel">
        <div class="tp-area" id="tpArea"><div class="tp-hint">Drag to move cursor</div></div>
        <div class="tp-buttons">
            <button class="tp-btn" id="tpLeft">Left</button>
            <button class="tp-btn mid" id="tpMid">Mid</button>
            <button class="tp-btn" id="tpRight">Right</button>
        </div>
    </div>
</div>

<div id="diacPopup"><div class="diac-row" id="diacRow"></div></div>
<div id="clipPopup"></div>

<script>
'use strict';

// ======================== STATE ========================
const mods = { ctrl:false, alt:false, shift:false, meta:false };
const tp = { tracking:false, lastX:0, lastY:0, startX:0, startY:0, totalMove:0, fingers:0, scrollLastY:0, tapStart:0, lastTap:0, tapTimeout:null };
const SENSITIVITY = 1.5, SCROLL_SENS = 3;
let compactPage = 'abc'; // 'abc' or 'sym'
let fnActive = false;
let capsLock = false;

// ======================== ANDROID BRIDGE ========================
const A = window.Android || {
    sendChar(){}, sendKey(){}, pointerMove(){}, click(){}, mouseDown(){}, mouseUp(){},
    doubleClick(){}, scroll(){}, hideOverlay(){}, sendModifier(){}, backToMenu(){},
    getClipboard(){ return ''; }
};

// Poll clipboard for changes (to populate history when user copies from VS Code)
let lastClip = '';
setInterval(() => {
    try {
        const c = A.getClipboard();
        if (c && c !== lastClip) { lastClip = c; addToClipHistory(c); }
    } catch(_){}
}, 2000);

// ======================== KEY HELPERS ========================
function esc(s) { return s.replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function K(key, label, cls) {
    const c = cls ? ` ${cls}` : '';
    return `<button class="key${c}" data-key="${esc(key)}">${label||esc(key)}</button>`;
}
function C(ch) { return `<button class="key char-key" data-char="${ch}">${ch}</button>`; }
function M(mod, label, cls) {
    const c = cls ? ` ${cls}` : '';
    return `<button class="key key-mod${c}" data-mod="${mod}">${label}</button>`;
}
function SEP(cls) { return `<div class="${cls||'fn-sep'}"></div>`; }

// Swipe key: renders a key with corner labels (Unexpected Keyboard style)
// When fnActive, NE corner shows F-key instead of number
function SK(ch) {
    const s = SWIPE[ch] || [null,null,null,null];
    const labels = [...s];
    // Fn mode: replace NE number with F-key label
    if (fnActive && labels[1] && FN_MAP[labels[1]]) {
        labels[1] = FN_MAP[labels[1]];
    }
    const [nw,ne,sw,se] = labels.map(v => v ? esc(v) : '');
    return `<button class="key char-key swipe-key" data-char="${ch}">
        <span class="sw-nw">${nw}</span><span class="sw-ne">${ne}</span>
        <span class="sw-c">${ch}</span>
        <span class="sw-sw">${sw}</span><span class="sw-se">${se}</span>
    </button>`;
}

// ======================== SWIPE MAP (Unexpected Keyboard US QWERTY) ========================
// [nw, ne, sw, se] — null = no swipe char in that direction
const SWIPE = {
    // Top row: NE = numbers
    'q': [null,'1',null,'Esc'],
    'w': ['~','2','@',null],
    'e': ['!','3','#','\u20AC'],
    'r': [null,'4','$',null],
    't': [null,'5','%',null],
    'y': [null,'6','^',null],
    'u': [null,'7','&',null],
    'i': [null,'8','*',null],
    'o': [null,'9','(',')'],
    'p': [null,'0',null,null],
    // Home row
    'a': ['Tab','`',null,null],
    's': [null,'\u00A7','\u00DF',null],
    'g': [null,'-','_',null],
    'h': [null,'=','+',null],
    'j': [null,null,'{','}'],
    'k': [null,null,'[',']'],
    'l': [null,'|','\\',null],
    // Bottom letter row
    'x': [null,'\u2020',null,null],
    'c': [null,'<','.',null],
    'v': [null,'>',',',null],
    'b': [null,'?','/',null],
    'n': [null,':',';',null],
    'm': [null,'"',"'",null],
};

// Nav key: 8 directions [N, NE, E, SE, S, SW, W, NW]
const NAV_SWIPE = ['Up','PgUp','Right','PgDn','Down','End','Left','Home'];

// Fn mode: NE swipe numbers become F-keys
const FN_MAP = {'1':'F1','2':'F2','3':'F3','4':'F4','5':'F5',
                '6':'F6','7':'F7','8':'F8','9':'F9','0':'F10'};

// ======================== DIACRITICS MAP ========================
const DIAC = {
    // Letters with diacritics
    'a':['á','à','â','ä','ã','å','ą','æ'],
    'c':['č','ć','ç'],
    'd':['ď','đ'],
    'e':['é','è','ě','ê','ë','ę'],
    'i':['í','ì','î','ï'],
    'l':['ľ','ĺ','ł'],
    'n':['ň','ñ','ń'],
    'o':['ó','ò','ô','ö','õ','ø','ő'],
    'r':['ř','ŕ'],
    's':['š','ś','ş','ß'],
    't':['ť','ţ'],
    'u':['ú','ù','û','ü','ů','ű'],
    'y':['ý','ÿ'],
    'z':['ž','ź','ż'],
    // Numbers → shift-row symbols + F-keys
    '1':['!','¹','½','⅓','F1'],
    '2':['@','²','⅔','F2'],
    '3':['#','³','⅛','F3'],
    '4':['$','€','£','¥','F4'],
    '5':['%','‰','F5'],
    '6':['^','¬','F6'],
    '7':['&','§','F7'],
    '8':['*','×','•','F8'],
    '9':['(','[','{','<','F9'],
    '0':[')',']','}','>','F10'],
    // Punctuation
    '.':['…',',',':',';','!','?'],
    ',':['<',';',':','«','»'],
    '-':['–','—','_','~','±','F11'],
    '/':['\\','|','÷'],
    '=':['≠','≈','±','≤','≥','F12'],
    "'":['`','"','\u201C','\u201D','\u2018','\u2019','\u00B4'],
};

// ======================== CLIPBOARD HISTORY ========================
const clipHistory = [];
const MAX_CLIP = 10;
function addToClipHistory(text) {
    if (!text || text.length > 500) return;
    const idx = clipHistory.indexOf(text);
    if (idx >= 0) clipHistory.splice(idx, 1);
    clipHistory.unshift(text);
    if (clipHistory.length > MAX_CLIP) clipHistory.pop();
}

// ======================== HAPTIC ========================
function haptic() {
    try { A.haptic(); } catch(_) {}
}

// ======================== COMPACT: LETTERS (Unexpected Keyboard style) ========================
function quickActions() {
    return `<div class="action-bar">
        <button class="action-btn" data-action="ctrl+shift+p">Cmd Palette</button>
        <button class="action-btn" data-action="ctrl+s">Save</button>
        <button class="action-btn" data-action="ctrl+z">Undo</button>
        <button class="action-btn" data-action="ctrl+shift+z">Redo</button>
        <button class="action-btn" data-action="ctrl+p">Quick Open</button>
        <button class="action-btn" data-action="ctrl+shift+f">Search Files</button>
        <button class="action-btn" data-action="ctrl+b">Sidebar</button>
        <button class="action-btn" data-action="ctrl+\`">Terminal</button>
    </div>`;
}

function compactLetters() {
    return `
        ${quickActions()}
        <div class="row">${'qwertyuiop'.split('').map(SK).join('')}</div>
        <div class="row row-home">${'asdfghjkl'.split('').map(SK).join('')}</div>
        <div class="row row-shift">
            <button class="key swipe-special uk-shift" data-mod="shift" id="shiftKey">
                <span class="sw-ne">CapsLk</span>
                <span class="sw-c">\u21E7</span>
            </button>
            ${'zxcvbnm'.split('').map(SK).join('')}
            <button class="key swipe-special uk-bksp" data-key="Bksp" id="bkspKey">
                <span class="sw-ne">Del</span>
                <span class="sw-c">\u232B</span>
            </button>
        </div>
        <div class="row row-bottom row-uk">
            <button class="key key-mod uk-ctrl" data-mod="ctrl">Ctrl</button>
            <button class="key uk-fn" id="fnToggle">Fn</button>
            ${M('alt','Alt')}
            <button class="key space-key" data-key="Space"><span class="sp-hint-l">\u25C0</span><span class="sp-hint-r">\u25B6</span></button>
            <button class="key uk-nav" id="navKey">
                <span class="nav-nw">Hm</span><span class="nav-n">\u25B2</span><span class="nav-ne">PU</span>
                <span class="nav-w">\u25C0</span><span style="grid-area:c;pointer-events:none"></span><span class="nav-e">\u25B6</span>
                <span class="nav-sw">End</span><span class="nav-s">\u25BC</span><span class="nav-se">PD</span>
            </button>
            ${K('Enter','\u21B5','uk-enter')}
        </div>`;
}

// ======================== COMPACT: SYMBOLS ========================
function compactSymbols() {
    return `
        <div class="row row-num">${'1234567890'.split('').map(d=>K(d)).join('')}</div>
        <div class="row">${['-','=','`','~','_','+','\\','|','/','?'].map(s=>K(s)).join('')}</div>
        <div class="row">${['!','@','#','$','%','^','&','*','(',')'].map(s=>K(s)).join('')}</div>
        <div class="row">${['{','}','[',']',':',';',"'",'"','<','>'].map(s=>K(s)).join('')}</div>
        <div class="row">
            ${K('Left','\u25C0')} ${K('Down','\u25BC')} ${K('Up','\u25B2')} ${K('Right','\u25B6')}
            ${K('Esc')} ${K('Tab')} ${K('Home','Hm')} ${K('End')} ${K('Del')}
        </div>
        <div class="row row-bottom">
            <button class="key wide-key" id="symToggle" style="font-size:14px">ABC</button>
            ${M('ctrl','Ctrl')} ${M('alt','Alt')} ${M('meta','Meta')}
            <button class="key space-key" data-key="Space">space</button>
            ${K('Bksp','\u232B')} ${K('Enter','\u21B5','wide-key')}
        </div>`;
}

// ======================== WIDE: PC KEYBOARD ========================
function fullKB() {
    return `
        <div class="row fn-row">
            ${K('Esc','Esc')} ${SEP()}
            ${K('F1','F1')} ${K('F2','F2')} ${K('F3','F3')} ${K('F4','F4')} ${SEP()}
            ${K('F5','F5')} ${K('F6','F6')} ${K('F7','F7')} ${K('F8','F8')} ${SEP()}

// ======================== LAYOUT ========================
let currentLayout = '';
const kbPanel = document.getElementById('kbPanel');
const tpPanel = document.getElementById('tpPanel');

function renderCompact() {
    kbPanel.innerHTML = compactPage === 'abc' ? compactLetters() : compactSymbols();
    attachKeyEvents();
    // Restore Fn visual state after re-render
    const fnBtn = document.getElementById('fnToggle');
    if (fnBtn && fnActive) fnBtn.classList.add('mod-active');
    // Restore mod visual states
    document.querySelectorAll('.key-mod').forEach(b => {
        if (mods[b.dataset.mod]) b.classList.add('mod-active');
    });
    if (mods.shift) kbPanel.classList.add('shifted');
    const symBtn = document.getElementById('symToggle');
    if (symBtn) {
        symBtn.addEventListener('pointerdown', e => {
            e.preventDefault(); e.stopPropagation();
            compactPage = compactPage === 'abc' ? 'sym' : 'abc';
            renderCompact();
        });
    }
}

function updateLayout() {
    const wide = window.innerWidth > 900;
    const layout = wide ? 'wide' : 'compact';
    if (layout === currentLayout) return;
    currentLayout = layout;
    if (wide) {
        kbPanel.innerHTML = fullKB();
        attachKeyEvents();
        kbPanel.classList.add('active');
        tpPanel.classList.add('active');
    } else {
        // Compact: only keyboard visible, hide touchpad
        tpPanel.classList.remove('active');
        kbPanel.classList.add('active');
        document.getElementById('tpToggle').classList.remove('active');
        renderCompact();
    }
}

// ======================== KEY EVENTS ========================
function resetMods() {
    mods.ctrl = mods.alt = mods.meta = false;
    mods.shift = capsLock; // Keep shift on if CapsLock active
    document.querySelectorAll('.key-mod').forEach(b => {
        if (b.dataset.mod === 'shift') {
            b.classList.toggle('mod-active', capsLock);
        } else {
            b.classList.remove('mod-active');
        }
    });
    // Also update swipe-special shift
    const shBtn = document.getElementById('shiftKey');
    if (shBtn) shBtn.classList.toggle('mod-active', capsLock);
    kbPanel.classList.toggle('shifted', capsLock);
}

function toggleMod(mod) {
    mods[mod] = !mods[mod];
    document.querySelectorAll('.key-mod').forEach(b => b.classList.toggle('mod-active', mods[b.dataset.mod]));
    if (mod === 'shift') kbPanel.classList.toggle('shifted', mods.shift);
}

// Keys that ALWAYS go through dispatchKey (never sendChar)
const SPECIAL_KEYS = new Set(['Esc','Tab','Enter','Bksp','Del','Home','End',
    'PgUp','PgDn','Ins','Up','Down','Left','Right',
    'F1','F2','F3','F4','F5','F6','F7','F8','F9','F10','F11','F12']);

// ======================== KEY REPEAT ========================
let repeatTimer = null, repeatInterval = null;
let REPEAT_DELAY = 400, REPEAT_RATE = 50;
function startRepeat(action) {
    stopRepeat();
    repeatTimer = setTimeout(() => {
        action();
        repeatInterval = setInterval(action, REPEAT_RATE);
    }, REPEAT_DELAY);
}
function stopRepeat() {
    clearTimeout(repeatTimer); clearInterval(repeatInterval);
    repeatTimer = null; repeatInterval = null;
}
// Called from Android when settings change
function updateRepeatSettings(delay, rate) {
    REPEAT_DELAY = delay || 400;
    REPEAT_RATE = rate || 50;
}

// ======================== SWIPE HELPERS ========================
const SWIPE_THRESHOLD = 12; // px minimum swipe distance

function sendSwipeChar(ch) {
    if (SPECIAL_KEYS.has(ch)) {
        A.sendKey(JSON.stringify({key:ch, ctrl:mods.ctrl, alt:mods.alt, shift:mods.shift, meta:mods.meta}));
    } else if (mods.ctrl || mods.alt || mods.meta) {
        A.sendKey(JSON.stringify({key:ch, ctrl:mods.ctrl, alt:mods.alt, shift:mods.shift, meta:mods.meta}));
    } else {
        A.sendChar(mods.shift ? ch.toUpperCase() : ch);
    }
}

function getSwipeDirection4(dx, dy) {
    // Returns index into [nw, ne, sw, se] or -1 if below threshold
    const dist = Math.sqrt(dx*dx + dy*dy);
    if (dist < SWIPE_THRESHOLD) return -1;
    const isRight = dx > 0, isUp = dy < 0;
    if (isUp && !isRight) return 0; // NW
    if (isUp && isRight) return 1;  // NE
    if (!isUp && !isRight) return 2; // SW
    return 3; // SE
}

function getSwipeDirection8(dx, dy) {
    // Returns index into NAV_SWIPE [N, NE, E, SE, S, SW, W, NW] or -1
    const dist = Math.sqrt(dx*dx + dy*dy);
    if (dist < SWIPE_THRESHOLD) return -1;
    const angle = Math.atan2(-dy, dx) * 180 / Math.PI; // -180..180, 0=right
    // Convert to 0..360 clockwise from N
    const cw = ((90 - angle) % 360 + 360) % 360;
    return Math.round(cw / 45) % 8;
}

// ======================== DIACRITICS POPUP (Gboard-style) ========================
// Hold key -> popup appears -> slide finger to char -> release = sends that char
// If released before popup -> sends original char (normal tap)
const diacPopup = document.getElementById('diacPopup');
const diacRow = document.getElementById('diacRow');
let diacTimer = null, diacShown = false, diacChars = [], diacSelected = -1, diacOrigChar = '';

function showDiacPopup(ch, btnRect) {
    const alts = DIAC[ch.toLowerCase()];
    if (!alts || alts.length === 0) return;
    diacChars = alts;
    diacSelected = -1;
    diacOrigChar = ch;
    diacRow.innerHTML = '';
    alts.forEach((d, i) => {
        const k = document.createElement('div');
        k.className = 'diac-key';
        k.textContent = mods.shift ? d.toUpperCase() : d;
        k.dataset.idx = i;
        diacRow.appendChild(k);
    });
    const pw = alts.length * 48 + 8;
    let left = btnRect.left + btnRect.width/2 - pw/2;
    left = Math.max(4, Math.min(left, window.innerWidth - pw - 4));
    diacPopup.style.left = left + 'px';
    diacPopup.style.top = (btnRect.top - 52) + 'px';
    diacPopup.style.display = 'block';
    diacShown = true;
    haptic();
}

function updateDiacHighlight(x, y) {
    if (!diacShown) return;
    const keys = diacRow.querySelectorAll('.diac-key');
    let found = -1;
    keys.forEach((k, i) => {
        const r = k.getBoundingClientRect();
        // Generous vertical hit area (finger is below the popup)
        if (x >= r.left - 5 && x <= r.right + 5 && y >= r.top - 30 && y <= r.bottom + 30) {
            found = i;
        }
        k.style.background = '';
    });
    if (found >= 0) {
        keys[found].style.background = '#007acc';
        if (found !== diacSelected) haptic();
    }
    diacSelected = found;
}

function commitDiac() {
    if (diacShown && diacSelected >= 0 && diacSelected < diacChars.length) {
        const d = diacChars[diacSelected];
        if (SPECIAL_KEYS.has(d)) {
            A.sendKey(JSON.stringify({key:d, ctrl:mods.ctrl, alt:mods.alt, shift:mods.shift, meta:mods.meta}));
        } else {
            A.sendChar(mods.shift ? d.toUpperCase() : d);
        }
    }
    // If no diac selected and popup was shown, send nothing (original char not sent yet)
    hideDiacPopup();
    resetMods();
}

function hideDiacPopup() {
    diacPopup.style.display = 'none';
    diacShown = false;
    diacSelected = -1;
    clearTimeout(diacTimer); diacTimer = null;
}

function attachKeyEvents() {
    // Character keys (a-z) — swipe for symbols, hold for diacritics
    kbPanel.querySelectorAll('.char-key').forEach(btn => {
        const ch = btn.dataset.char;
        const swipeMap = SWIPE[ch]; // [nw, ne, sw, se] or undefined

        const fireChar = () => {
            const c = mods.shift ? ch.toUpperCase() : ch;
            if (mods.ctrl || mods.alt || mods.meta) {
                A.sendKey(JSON.stringify({key:c, ctrl:mods.ctrl, alt:mods.alt, shift:mods.shift, meta:mods.meta}));
            } else {
                A.sendChar(c);
            }
        };

        let pendingChar = false;
        let startX = 0, startY = 0;

        btn.addEventListener('pointerdown', e => {
            e.preventDefault(); e.stopPropagation();
            haptic();
            btn.classList.add('pressed');
            startX = e.clientX; startY = e.clientY;
            pendingChar = true;

            // Do NOT fire char yet — wait for pointerup to detect swipe vs tap
            if (DIAC[ch] && !mods.ctrl && !mods.alt && !mods.meta) {
                // Has diacritics: long-press shows popup
                diacTimer = setTimeout(() => {
                    pendingChar = false;
                    stopRepeat();
                    showDiacPopup(ch, btn.getBoundingClientRect());
                }, 300);
            }
        });

        btn.addEventListener('pointermove', e => {
            if (diacShown) updateDiacHighlight(e.clientX, e.clientY);
        });

        btn.addEventListener('pointerup', e => {
            clearTimeout(diacTimer); diacTimer = null;
            stopRepeat();
            btn.classList.remove('pressed');

            if (diacShown) {
                updateDiacHighlight(e.clientX, e.clientY);
                commitDiac();
                return;
            }
            if (!pendingChar) return;
            pendingChar = false;

            // Check for swipe — send corner char OR center char, not both
            const dx = e.clientX - startX;
            const dy = e.clientY - startY;
            const dir = getSwipeDirection4(dx, dy);

            if (dir >= 0 && swipeMap) {
                let target = swipeMap[dir];

                if (fnActive && dir === 1 && target && FN_MAP[target]) {
                    target = FN_MAP[target];
                    fnActive = false;
                    const fnBtn = document.getElementById('fnToggle');
                    if (fnBtn) fnBtn.classList.remove('mod-active');
                }

                if (target) {
                    sendSwipeChar(target);
                    resetMods();
                    return;
                }
            }

            // Fallback: normal tap
            fireChar();
            resetMods();
        });

        btn.addEventListener('pointerleave', e => {
            if (diacShown) {
                // Let global handler track
            } else {
                clearTimeout(diacTimer); diacTimer = null;
                stopRepeat();
                if (pendingChar) {
                    pendingChar = false;
                    fireChar();
                    resetMods();
                }
                btn.classList.remove('pressed');
            }
        });

        btn.addEventListener('pointercancel', () => {
            clearTimeout(diacTimer); stopRepeat();
            pendingChar = false;
            btn.classList.remove('pressed');
            hideDiacPopup();
        });
    });

    // Track finger movement globally for diacritics slide
    document.addEventListener('pointermove', e => {
        if (diacShown) updateDiacHighlight(e.clientX, e.clientY);
    }, {passive:true});
    document.addEventListener('pointerup', e => {
        if (diacShown) { updateDiacHighlight(e.clientX, e.clientY); commitDiac(); }
    }, {passive:true});

    // Special + symbol keys (data-key) — with haptic + long-press popup
    kbPanel.querySelectorAll('.key[data-key]:not(.key-mod):not(.uk-nav):not(.swipe-special)').forEach(btn => {
        const fireKey = () => {
            const key = btn.dataset.key;
            if (key === 'Space' && !mods.ctrl && !mods.alt && !mods.meta) {
                A.sendChar(' ');
            } else if (SPECIAL_KEYS.has(key) || key === 'Space' || mods.ctrl || mods.alt || mods.meta) {
                A.sendKey(JSON.stringify({key, ctrl:mods.ctrl, alt:mods.alt, shift:mods.shift, meta:mods.meta}));
            } else {
                A.sendChar(key);
            }
        };
        const key = btn.dataset.key;
        const hasDiac = DIAC[key] && !SPECIAL_KEYS.has(key) && key !== 'Space';
        const isSpace = key === 'Space';
        const isBksp = key === 'Bksp';
        let pendingKey = false;
        let startX = 0, startY = 0;

        btn.addEventListener('pointerdown', e => {
            e.preventDefault(); e.stopPropagation();
            haptic();
            btn.classList.add('pressed');
            startX = e.clientX; startY = e.clientY;

            if (isBksp) {
                // Bksp: fire immediately + repeat, swipe NE on release → Del
                pendingKey = true;
                fireKey();
                startRepeat(fireKey);
            } else if (isSpace) {
                // Space: wait for pointerup to detect swipe left/right
                pendingKey = true;
            } else if (hasDiac && !mods.ctrl && !mods.alt && !mods.meta) {
                pendingKey = true;
                diacTimer = setTimeout(() => {
                    pendingKey = false;
                    stopRepeat();
                    showDiacPopup(key, btn.getBoundingClientRect());
                }, 300);
            } else {
                pendingKey = false;
                fireKey();
                startRepeat(fireKey);
            }
        });
        btn.addEventListener('pointermove', e => {
            if (diacShown) updateDiacHighlight(e.clientX, e.clientY);
        });
        btn.addEventListener('pointerup', e => {
            clearTimeout(diacTimer); diacTimer = null;
            stopRepeat();
            btn.classList.remove('pressed');

            if (diacShown) {
                updateDiacHighlight(e.clientX, e.clientY);
                commitDiac();
                return;
            }

            if (isSpace && pendingKey) {
                pendingKey = false;
                const dx = e.clientX - startX;
                if (Math.abs(dx) >= SWIPE_THRESHOLD) {
                    const dir = dx > 0 ? 'Right' : 'Left';
                    A.sendKey(JSON.stringify({key:dir, ctrl:false, alt:false, shift:false, meta:false}));
                } else {
                    fireKey();
                }
                resetMods();
                return;
            }

            if (isBksp && pendingKey) {
                // Repeat already handled; just reset
                pendingKey = false;
                resetMods();
                return;
            }

            if (pendingKey) {
                pendingKey = false;
                fireKey();
                resetMods();
            } else {
                resetMods();
            }
        });
        btn.addEventListener('pointerleave', e => {
            if (diacShown) {
                // Let global handler track
            } else {
                clearTimeout(diacTimer); diacTimer = null;
                stopRepeat();
                if (pendingKey) { pendingKey = false; fireKey(); resetMods(); }
                btn.classList.remove('pressed');
            }
        });
        btn.addEventListener('pointercancel', () => {
            clearTimeout(diacTimer); stopRepeat();
            pendingKey = false;
            btn.classList.remove('pressed');
            hideDiacPopup();
        });
    });

    // Modifiers (tap toggle) — excludes swipe-special shift
    kbPanel.querySelectorAll('.key-mod:not(.swipe-special)').forEach(btn => {
        btn.addEventListener('pointerdown', e => {
            e.preventDefault(); e.stopPropagation();
            haptic();
            toggleMod(btn.dataset.mod);
        });
    });

    // Shift key (swipe-enabled): tap = toggle shift, NE swipe = CapsLock, double-tap = CapsLock
    const shiftBtn = document.getElementById('shiftKey');
    if (shiftBtn) {
        let shStartX = 0, shStartY = 0, shLastTap = 0;
        shiftBtn.addEventListener('pointerdown', e => {
            e.preventDefault(); e.stopPropagation();
            haptic();
            shiftBtn.classList.add('pressed');
            shStartX = e.clientX; shStartY = e.clientY;
        });
        shiftBtn.addEventListener('pointerup', e => {
            shiftBtn.classList.remove('pressed');
            const dx = e.clientX - shStartX, dy = e.clientY - shStartY;
            const dir = getSwipeDirection4(dx, dy);
            if (dir === 1) {
                // NE swipe → CapsLock (permanent shift)
                capsLock = !capsLock;
                mods.shift = capsLock;
                shiftBtn.classList.toggle('mod-active', capsLock);
                kbPanel.classList.toggle('shifted', capsLock);
                document.querySelectorAll('.key-mod[data-mod="shift"]').forEach(b => b.classList.toggle('mod-active', capsLock));
            } else {
                // Tap → toggle shift (one-shot)
                const now = Date.now();
                if (now - shLastTap < 300) {
                    // Double-tap → CapsLock
                    capsLock = !capsLock;
                    mods.shift = capsLock;
                    shiftBtn.classList.toggle('mod-active', capsLock);
                    kbPanel.classList.toggle('shifted', capsLock);
                    shLastTap = 0;
                } else {
                    capsLock = false;
                    toggleMod('shift');
                    shLastTap = now;
                }
            }
        });
        shiftBtn.addEventListener('pointerleave', () => shiftBtn.classList.remove('pressed'));
        shiftBtn.addEventListener('pointercancel', () => shiftBtn.classList.remove('pressed'));
    }

    // Backspace key (swipe-enabled): tap = Bksp + repeat, NE swipe = Delete
    const bkspBtn = document.getElementById('bkspKey');
    if (bkspBtn) {
        let bkStartX = 0, bkStartY = 0, bkFired = false;
        const fireBksp = () => {
            A.sendKey(JSON.stringify({key:'Bksp', ctrl:mods.ctrl, alt:mods.alt, shift:mods.shift, meta:mods.meta}));
        };
        bkspBtn.addEventListener('pointerdown', e => {
            e.preventDefault(); e.stopPropagation();
            haptic();
            bkspBtn.classList.add('pressed');
            bkStartX = e.clientX; bkStartY = e.clientY;
            bkFired = true;
            fireBksp();
            startRepeat(fireBksp);
        });
        bkspBtn.addEventListener('pointerup', e => {
            stopRepeat();
            bkspBtn.classList.remove('pressed');
            if (bkFired) {
                const dx = e.clientX - bkStartX, dy = e.clientY - bkStartY;
                const dir = getSwipeDirection4(dx, dy);
                if (dir === 1) {
                    // NE swipe → Delete (forward delete)
                    A.sendKey(JSON.stringify({key:'Del', ctrl:mods.ctrl, alt:mods.alt, shift:mods.shift, meta:mods.meta}));
                }
                bkFired = false;
                resetMods();
            }
        });
        bkspBtn.addEventListener('pointerleave', () => { stopRepeat(); bkFired = false; bkspBtn.classList.remove('pressed'); });
        bkspBtn.addEventListener('pointercancel', () => { stopRepeat(); bkFired = false; bkspBtn.classList.remove('pressed'); });
    }

    // Fn toggle — re-render to show F-key labels
    const fnBtn = document.getElementById('fnToggle');
    if (fnBtn) {
        fnBtn.addEventListener('pointerdown', e => {
            e.preventDefault(); e.stopPropagation();
            haptic();
            fnActive = !fnActive;
            renderCompact(); // re-render to update corner labels
        });
    }

    // Nav key (8-direction swipe for arrows/navigation)
    const navBtn = document.getElementById('navKey');
    if (navBtn) {
        let navStartX = 0, navStartY = 0;
        navBtn.addEventListener('pointerdown', e => {
            e.preventDefault(); e.stopPropagation();
            haptic();
            navBtn.classList.add('pressed');
            navStartX = e.clientX; navStartY = e.clientY;
        });
        navBtn.addEventListener('pointerup', e => {
            navBtn.classList.remove('pressed');
            const dx = e.clientX - navStartX;
            const dy = e.clientY - navStartY;
            const dir = getSwipeDirection8(dx, dy);
            if (dir >= 0) {
                const key = NAV_SWIPE[dir];
                if (key) {
                    A.sendKey(JSON.stringify({key, ctrl:mods.ctrl, alt:mods.alt, shift:mods.shift, meta:mods.meta}));
                    resetMods();
                }
            }
            // Tap with no swipe = no action (just a visual press)
        });
        navBtn.addEventListener('pointerleave', () => { navBtn.classList.remove('pressed'); });
        navBtn.addEventListener('pointercancel', () => { navBtn.classList.remove('pressed'); });
    }

    // Quick action buttons
    kbPanel.querySelectorAll('.action-btn').forEach(btn => {
        btn.addEventListener('pointerdown', e => {
            e.preventDefault(); e.stopPropagation();
            haptic();
            const action = btn.dataset.action;
            if (!action) return;
            const parts = action.split('+');
            const key = parts[parts.length - 1];
            A.sendKey(JSON.stringify({
                key: key, ctrl: parts.includes('ctrl'), alt: parts.includes('alt'),
                shift: parts.includes('shift'), meta: parts.includes('meta')
            }));
            btn.classList.add('pressed'); setTimeout(() => btn.classList.remove('pressed'), 100);
        });
    });
}

// Dismiss diacritics popup on tap elsewhere
document.addEventListener('pointerdown', e => {
    if (diacShown && !diacPopup.contains(e.target) && !e.target.classList.contains('char-key'))
        hideDiacPopup();
}, {passive:true});

// ======================== CLIPBOARD POPUP ========================
const clipPopup = document.getElementById('clipPopup');
document.getElementById('clipBtn').addEventListener('pointerdown', e => {
    e.preventDefault();
    if (clipPopup.style.display === 'block') { clipPopup.style.display = 'none'; return; }
    clipPopup.innerHTML = '';
    if (clipHistory.length === 0) {
        clipPopup.innerHTML = '<div style="padding:12px;color:#888;font-size:12px">No clipboard history</div>';
    } else {
        clipHistory.forEach(text => {
            const item = document.createElement('button');
            item.className = 'clip-item';
            item.textContent = text.length > 40 ? text.substring(0,38) + '..' : text;
            item.addEventListener('pointerdown', ev => {
                ev.preventDefault(); ev.stopPropagation();
                A.sendChar(text);
                clipPopup.style.display = 'none';
            });
            clipPopup.appendChild(item);
        });
    }
    const rect = e.target.getBoundingClientRect();
    clipPopup.style.left = Math.max(4, rect.left) + 'px';
    clipPopup.style.top = (rect.bottom + 4) + 'px';
    clipPopup.style.display = 'block';
});
document.addEventListener('pointerdown', e => {
    if (clipPopup.style.display === 'block' && !clipPopup.contains(e.target) && e.target.id !== 'clipBtn')
        clipPopup.style.display = 'none';
}, {passive:true});

// ======================== TOUCHPAD ========================
const TAP_MOVE_THRESHOLD = 10;
const tpArea = document.getElementById('tpArea');
let tpDragging = false; // double-tap-and-hold drag state

tpArea.addEventListener('touchstart', e => {
    e.preventDefault();
    // Use targetTouches (only touches on touchpad, not on buttons)
    const t = e.targetTouches;
    tp.tracking = true; tp.fingers = t.length;
    tp.lastX = t[0].clientX; tp.lastY = t[0].clientY;
    tp.startX = t[0].clientX; tp.startY = t[0].clientY;
    tp.totalMove = 0;
    if (t.length >= 2) tp.scrollLastY = t[0].clientY;
    tp.tapStart = Date.now();
}, {passive:false});

tpArea.addEventListener('touchmove', e => {
    e.preventDefault();
    if (!tp.tracking) return;
    const t = e.targetTouches[0];
    if (!t) return;
    const dx = t.clientX - tp.lastX, dy = t.clientY - tp.lastY;
    tp.lastX = t.clientX; tp.lastY = t.clientY;
    tp.totalMove += Math.abs(dx) + Math.abs(dy);
    if (e.targetTouches.length >= 2) {
        const sd = t.clientY - tp.scrollLastY; tp.scrollLastY = t.clientY;
        A.scroll(sd * SCROLL_SENS);
    } else {
        A.pointerMove(dx * SENSITIVITY, dy * SENSITIVITY);
        // Double-tap-and-hold: if moved past threshold, start drag
        if (!tpDragging && tp.lastTap > 0 && Date.now() - tp.lastTap < 300 && tp.totalMove > TAP_MOVE_THRESHOLD) {
            tpDragging = true;
            haptic(); A.mouseDown(0);
        }
    }
}, {passive:false});

tpArea.addEventListener('touchend', e => {
    e.preventDefault();
    // End drag if active
    if (tpDragging) {
        tpDragging = false;
        A.mouseUp(0);
        tp.tracking = false; tp.fingers = 0; tp.tapStart = 0;
        return;
    }
    tp.tracking = false;
    const el = Date.now() - tp.tapStart;
    const isTap = tp.tapStart > 0 && el < 300 && tp.totalMove < TAP_MOVE_THRESHOLD;
    if (isTap) {
        const now = Date.now();
        if (tp.fingers >= 2) {
            // 2-finger tap -> right click
            haptic(); A.click(2);
        } else if (tp.fingers === 1) {
            // Single tap -> immediate left click
            haptic(); A.click(0);
            // Record for double-tap-and-hold detection
            if (now - tp.lastTap < 300) {
                A.doubleClick();
                // Keep lastTap for potential hold-drag on next touch
            }
            tp.lastTap = now;
        }
        tp.tapStart = 0;
    } else {
        tp.lastTap = 0; // Movement broke the tap sequence
    }
    tp.fingers = 0;
}, {passive:false});

// Left button: tap = click, hold = drag (mouseDown on press, mouseUp on release)
let leftBtnHeld = false;
document.getElementById('tpLeft').addEventListener('pointerdown', e => {
    e.preventDefault(); haptic();
    leftBtnHeld = true;
    A.mouseDown(0);
});
document.getElementById('tpLeft').addEventListener('pointerup', e => {
    e.preventDefault();
    if (leftBtnHeld) { leftBtnHeld = false; A.mouseUp(0); }
});
document.getElementById('tpLeft').addEventListener('pointercancel', e => {
    if (leftBtnHeld) { leftBtnHeld = false; A.mouseUp(0); }
});
document.getElementById('tpMid').addEventListener('pointerdown', e => { e.preventDefault(); haptic(); A.click(1); });
document.getElementById('tpRight').addEventListener('pointerdown', e => { e.preventDefault(); haptic(); A.click(2); });

// ======================== TOOLBAR ========================
document.getElementById('tpToggle').addEventListener('pointerdown', e => {
    e.preventDefault();
    const show = !tpPanel.classList.contains('active');
    kbPanel.classList.toggle('active', !show);
    tpPanel.classList.toggle('active', show);
    e.target.classList.toggle('active', show);
});

document.getElementById('menuBtn').addEventListener('pointerdown', e => {
    e.preventDefault();
    A.backToMenu();
});

document.getElementById('hideBtn').addEventListener('pointerdown', e => {
    e.preventDefault();
    A.hideOverlay();
});

// Prevent focus stealing
document.addEventListener('touchstart', e => e.preventDefault(), {passive:false});
document.addEventListener('mousedown', e => e.preventDefault());

// ======================== SYNC TP HEIGHT TO KB HEIGHT ========================
function syncTpHeight() {
    if (window.innerWidth > 900) return; // wide mode: flex handles it
    // Measure KB height (must be visible to measure)
    const wasActive = kbPanel.classList.contains('active');
    if (!wasActive) kbPanel.classList.add('active');
    const kbH = kbPanel.offsetHeight;
    if (!wasActive) kbPanel.classList.remove('active');
    if (kbH > 0) {
        tpPanel.style.minHeight = kbH + 'px';
    }
}

// ======================== INIT ========================
updateLayout();
// Sync TP height after layout settles
setTimeout(syncTpHeight, 100);
window.addEventListener('resize', () => { updateLayout(); setTimeout(syncTpHeight, 50); });
</script>
