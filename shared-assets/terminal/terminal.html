<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Claude Remote Terminal</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/css/xterm.min.css" />
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
        background: #1E1E1E;
        overflow: hidden;
        width: 100%;
        height: 100vh;
        display: flex;
        flex-direction: column;
    }
    #terminal {
        flex: 1;
        min-height: 0;
    }
    .xterm { height: 100%; }
    #error { color: #F44; font-family: monospace; padding: 20px; display: none; white-space: pre-wrap; }
</style>
</head>
<body>
<div id="error"></div>
<div id="terminal"></div>
<script src="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/lib/xterm.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@xterm/addon-fit@0.10.0/lib/addon-fit.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@xterm/addon-web-links@0.11.0/lib/addon-web-links.min.js"></script>
<script>
(function() {
    'use strict';

    var errorDiv = document.getElementById('error');
    function showError(msg) {
        errorDiv.style.display = 'block';
        errorDiv.textContent += msg + '\n';
    }

    function log(msg) {
        if (window.TerminalBridge) {
            try { window.TerminalBridge.onTerminalInput('\x00LOG:' + msg); } catch(e) {}
        }
    }

    if (typeof Terminal === 'undefined') {
        showError('ERROR: xterm.js not loaded');
        return;
    }

    try {
        var term = new Terminal({
            cursorBlink: true,
            fontSize: 14,
            fontFamily: '"Fira Code", "Cascadia Code", "JetBrains Mono", "Menlo", monospace',
            theme: {
                background: '#1E1E1E',
                foreground: '#D4D4D4',
                cursor: '#AEAFAD',
                selectionBackground: '#264F78',
                black: '#1E1E1E',
                red: '#F44747',
                green: '#6A9955',
                yellow: '#DCDCAA',
                blue: '#569CD6',
                magenta: '#C586C0',
                cyan: '#4EC9B0',
                white: '#D4D4D4',
                brightBlack: '#808080',
                brightRed: '#F44747',
                brightGreen: '#6A9955',
                brightYellow: '#DCDCAA',
                brightBlue: '#569CD6',
                brightMagenta: '#C586C0',
                brightCyan: '#4EC9B0',
                brightWhite: '#FFFFFF'
            },
            scrollback: 10000,
            convertEol: false
        });

        var fitAddon = new FitAddon.FitAddon();
        term.loadAddon(fitAddon);

        try {
            var webLinksAddon = new WebLinksAddon.WebLinksAddon();
            term.loadAddon(webLinksAddon);
        } catch(e) {}

        var termDiv = document.getElementById('terminal');
        term.open(termDiv);

        term.onData(function(data) {
            // Filter out our log messages
            if (data.indexOf('\x00LOG:') === 0) return;
            if (window.TerminalBridge) {
                window.TerminalBridge.onTerminalInput(data);
            }
        });

        term.onResize(function() {
            if (window.TerminalBridge) {
                window.TerminalBridge.onTerminalResize(term.cols, term.rows);
            }
        });

        function doFit() {
            try {
                fitAddon.fit();
            } catch(e) {}
        }

        function initFit() {
            var w = termDiv.clientWidth;
            var h = termDiv.clientHeight;
            var bw = document.body.clientWidth;
            var bh = document.body.clientHeight;
            var ww = window.innerWidth;
            var wh = window.innerHeight;

            if (h > 10) {
                doFit();
                if (window.TerminalBridge) {
                    window.TerminalBridge.onTerminalReady(term.cols, term.rows);
                }
                log('fit OK: term=' + w + 'x' + h + ' body=' + bw + 'x' + bh + ' win=' + ww + 'x' + wh + ' cols=' + term.cols + ' rows=' + term.rows);
            } else {
                log('waiting for height: term=' + w + 'x' + h + ' body=' + bw + 'x' + bh + ' win=' + ww + 'x' + wh);
                setTimeout(initFit, 100);
            }
        }

        // Start trying to fit after a short delay
        setTimeout(initFit, 100);

        window.addEventListener('resize', function() {
            doFit();
        });

        // API for native code
        window.writeOutput = function(data) {
            term.write(data);
        };

        window.writeOutputB64 = function(b64) {
            try {
                var raw = atob(b64);
                term.write(raw);
            } catch(e) {
                showError('writeOutputB64 error: ' + e);
            }
        };

        window.clearTerminal = function() {
            term.reset();
        };

        window.setFontSize = function(size) {
            term.options.fontSize = size;
            doFit();
        };

        window.setScrollback = function(lines) {
            term.options.scrollback = lines;
        };

        window.getTerminalInfo = function() {
            return JSON.stringify({
                cols: term.cols, rows: term.rows,
                termW: termDiv.clientWidth, termH: termDiv.clientHeight,
                bodyW: document.body.clientWidth, bodyH: document.body.clientHeight,
                winW: window.innerWidth, winH: window.innerHeight
            });
        };

    } catch(e) {
        showError('Terminal init error: ' + e.message + '\n' + e.stack);
    }
})();
</script>
</body>
</html>
